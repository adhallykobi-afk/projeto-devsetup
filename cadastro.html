<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>cadastro de clientes</h1>
        <p>crie sua conta para receber novidades e promoçoes</p>
        <a href="index.html">voltar para a pagina inicial</a>
    </header>

    <main>
        <form>
            <label for="nome">nome completo</label>
            <br>
            <input 
            type="text"
            id="nome"
            name="nome"
            placeholder="digita seu nome completo"
            required>
            <br><br>
            <label for="email">E-mail</label>
            <br>
            <input 
            type="email"
                id="email"
                name="email"
                placeholder="digite seu email"
                required>
                <br><br>

                <label>nivel do cliente:</label><br>
                <input 
                type="radio"
                id="comum"
                name="nivel"
                value="comum">      
                <label for="comum">cliente comum</label><br>
                <input 
                type="radio"
                id="empresa"
                name="nivel"
                value="empresa">
                <label for="comum">cliente comum</label><br>
                <input 
                type="radio"
                id="empresa"
                name="nivel"
                value="empresa">
                <label for="empres">empresa (CNPJ)</label><br><br>
                <label for="interesse">area de interesse</label>
                <select name="interesse" id="interesse">
                <option value="hardware">hardware</option>
                <option value="perifericos">perifericos</option>
                <option value="desenvolvimento">desenvolvimento</option>
                </select><br><br>
                <button>
                <type="submit">enviar cadastro</button>
            </form>
        </section>
        </main>              
                    
        </body>
    </html>
